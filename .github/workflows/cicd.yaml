name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: vipa-build-prod
  SERVICE_NAME: vipa-build-server
  REGION: us-east1
  REPO_NAME: vipa-build
  CLOUD_SQL_INSTANCE: vipa-build-prod:us-east1:vipa-build-db-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set project
        run: gcloud config set project $PROJECT_ID

      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build image
        run: |
          IMAGE=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO_NAME/$SERVICE_NAME:${{ github.sha }}
          docker build -t $IMAGE .
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Push image
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --concurrency 20 \
            --max-instances 2 \
            --timeout 30s \
            --set-env-vars "APP_ENV=prod,JWT_EXPIRATION_MINUTES=15,REFRESH_TOKEN_EXPIRATION_DAYS=10,GOOGLE_CLIENT_ID_WEB=538330222782-sk9hq06t3df1hmsmjfgjlvosuk7nr2v4.apps.googleusercontent.com,GOOGLE_CLIENT_ID_ANDROID=538330222782-sk9hq06t3df1hmsmjfgjlvosuk7nr2v4.apps.googleusercontent.com" \
            --set-secrets "DATABASE_DSN=DATABASE_DSN:latest,JWT_SECRET=JWT_SECRET:latest" \
            --add-cloudsql-instances $CLOUD_SQL_INSTANCE